---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngiapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ngiapp
  template:
    metadata:
      labels:
        app: ngiapp
    spec:
      containers:
        - image: nginx:1.25-alpine
          name: ngiapp
          ports:
            - containerPort: 80
---
apiVersion: v1	
kind: Service	
metadata:	
  name: ngiapp	
spec:	
  ports:	
  - port: 80	
    targetPort: 80	
  selector:	
    app: ngiapp
